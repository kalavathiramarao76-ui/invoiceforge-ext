<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Shine -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Invoice document -->
  <rect x="28" y="18" width="56" height="76" rx="4" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Document header line -->
  <line x1="38" y1="32" x2="60" y2="32" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Document lines -->
  <line x1="38" y1="44" x2="74" y2="44" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="38" y1="54" x2="68" y2="54" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="38" y1="64" x2="72" y2="64" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Separator line -->
  <line x1="38" y1="74" x2="74" y2="74" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="58" y1="82" x2="74" y2="82" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Dollar sign circle (bottom right overlay) -->
  <circle cx="88" cy="88" r="22" fill="#059669" stroke="white" stroke-width="3"/>
  <!-- Dollar sign -->
  <text x="88" y="96" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="28" fill="white">$</text>
  <!-- Sparkle (top right) -->
  <path d="M96 24 L98 30 L104 32 L98 34 L96 40 L94 34 L88 32 L94 30 Z" fill="white" opacity="0.8"/>
  <!-- Small sparkle -->
  <path d="M106 44 L107 47 L110 48 L107 49 L106 52 L105 49 L102 48 L105 47 Z" fill="white" opacity="0.5"/>
</svg>
